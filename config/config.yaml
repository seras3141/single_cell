  #     resampledPixelSpacing: null
  #     padDistance: 10
      
  #   morphology:
  #     extract_shape: true
  #     extract_firstorder: true
  #     extract_glcm: true
  #     extract_glrlm: false
  #     extract_glszm: false

# Visualization parameters
visualization:
  figure_size: [12, 8]
  dpi: 300
  colormap: "viridis"
  napari:
    gamma: 1.0
    contrast_limits: [0, 65535]

# # Output formats
# output:
#   save_masks: true
#   save_outlines: true
#   save_flows: false
#   save_features: true

# Logging configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  filename: "logs/pipeline.log"
