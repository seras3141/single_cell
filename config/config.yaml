# Single Cell Analysis Pipeline Configuration

# Data paths
paths:
  input_dir: "data/sample_data"
  output_dir: "data/sample_data_output"
  # results: "results/"
  # models: "models/"
  # temp: "temp/"

# File processing parameters
preprocessing:
  # Dataset splitting
  test_size: 1
  random_state: 42
  split_by_group: true
  split_folder: "split_data"
  out_3d_folder: "3d_data"

  # Wavelength-to-channel mappings differ by experiment — set the correct one here or via --experiment-name CLI.
  # Ew2-1, Ew2-2:          {1: FlipGFP, 2: mCherry, 3: BF}
  # HD1509, HD1883, SA110: {1: BF,      2: mCherry, 3: FlipGFP}
  # Leave null to use the default (Ew2 convention).
  wavelength_mappings:

  # Optional: default plate number for file renaming (overrides auto-detection from filepath)
  # plate_number: "2126"

  # Z-range for 2D-to-3D combination
  # z0 is the 2D projection and is skipped by default (z_min: 1)
  z_min: 1       # first z-slice to include (inclusive)
  z_max: 20      # last z-slice to include (inclusive); combine_2d_to_3d raises an error if any group has the wrong slice count
  
# Image quality assessment
quality:
  blur_detection:
    patch_size: [32, 32]
    stride_size: [8, 8]
  
# Segmentation parameters
segmentation:
  # Cellpose parameters
  cellpose:
    model_type: "cellpose_sam"
    channels: [0, 0]  # Grayscale
    diameter: null  # Auto-diameter
    flow_threshold: 0.4
    cellprob_threshold: 0.0
    min_size: 30
    normalize: true
    invert: false
    gpu: true
  inference:
    dataset_name: ""  # Subfolder within input_dir/results (empty = flat split_data / no dataset-split subfolder; matches inference_config.yaml)
    results_folder: "inference"  # Subfolder within output_dir
    file_pattern: "*_BF.tif"  # Glob pattern for selecting image files
    process_z_stacks: false  # Whether to process Z-stacks
    save_overlays: false  # Whether to save overlay images
    save_metadata: true  # Whether to save JSON metadata for predictions
    label_format: "zarr"  # Segmentation label format: tif, zarr, or hdf5

# # Training parameters
# training:
#   learning_rate: 0.1
#   weight_decay: 1e-4
#   n_epochs: 100
#   batch_size: 8
#   min_train_masks: 5
#   SGD: true
#   channels: [0, 0]
#   normalize: true

# Post-processing parameters
postprocessing:
  image_pattern: "*_BF_3d.tif"
  mask_pattern: "*_mask_3d.zarr"
  enable_blur_filtering: true
  filter_before_tracking: true
  save_intermediate_results: false

  filtering:
    # Cell filtering parameters
    # min_cell_size: 30
    # max_cell_size: 1000
    # min_nucleus_size: 10
    # max_nucleus_size: 500
    blur_threshold: 0.5

  # Cell tracking parameters
  tracking:
    min_area: 30
    max_area: 1000
    search_range: 5
    memory: 1
    min_track_length: 3


# feature_extraction:
