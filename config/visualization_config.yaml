# Feature Visualization Configuration
# This file contains default settings for feature visualization

visualization:
  # Output settings
  output_dir: "feature_visualizations_temp"
  save_plots: true
  show_plots: false
  dpi: 300
  
  # Plot styling
  style: "whitegrid"  # seaborn style
  figure_size: [12, 8]
  font_size: 12
  color_palette: "tab10"  # for sample colors
  
  # Dimensionality reduction settings
  reduction_methods:
    pca:
      n_components: 2
      random_state: 42
    
    tsne:
      n_components: 2
      random_state: 42
      perplexity: 30
      n_iter: 1000
      
    umap:
      n_components: 2
      random_state: 42
      n_neighbors: 15
      min_dist: 0.1

  # Visualization levels
  levels:
    z_stack:
      enabled: true
      max_features_violin: 5  # Max features for violin plots
      min_cells_per_stack: 3   # Min cells required for z-stack analysis
      
    sample:
      enabled: true
      max_features_heatmap: 8  # Max features for correlation heatmap
      
    dataset:
      enabled: true
      max_features_boxplot: 6   # Max features for boxplot
      max_features_correlation: 10  # Max features for correlation matrix
      
  # Interactive plotting
  interactive:
    enabled: false
    hover_data: ["instance_id", "z_stack", "sample_id"]
    plot_width: 800
    plot_height: 600

  # TensorBoard logging
  tensorboard:
    enabled: false
    log_dir: "tensorboard_logs"
    
  # Feature selection for visualization
  features:
    # Features to always include in analysis
    priority_features:
      - "area"
      - "elongation"
      - "circularity"
      - "mean_intensity"
      - "entropy"
    
    # Features to exclude from dimensionality reduction
    exclude_from_reduction:
      - "instance_id"
      - "filename"
      - "image_path"
      - "sample_id"
      - "z_stack"
      - "sample_z_id"
      - "centroid_x"
      - "centroid_y"
      - "center_of_mass_x"
      - "center_of_mass_y"
  
