# Single Cell Analysis Pipeline Configuration

# Data paths
paths:
  image_dir: "data/sample_data_out/3d_images"
  mask_dir: "data/sample_data_out/results/cyto3/test/masks_3d"
  blur_dir: "data/sample_data_out/blur_heatmaps"
  output_dir: "data/sample_data_out/results/cyto3/test/output/"
  
# Image quality assessment
quality:
  blur_detection:
    patch_size: [32, 32]
    stride_size: [8, 8]

postprocessing:
  image_pattern: "*_BF_3d.tif"
  mask_pattern: "*_mask_3d.tif"
  enable_blur_filtering: true
  filter_before_tracking: true
  save_intermediate_results: false

  filtering:
    # Cell filtering parameters
    # min_cell_size: 30
    # max_cell_size: 1000
    # min_nucleus_size: 10
    # max_nucleus_size: 500
    blur_threshold: 0.5

  # Cell tracking parameters
  tracking:
    min_area: 30
    max_area: 1000
    search_range: 5
    memory: 1
    min_track_length: 3



# Logging configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  filename: "logs/postprocessing.log"
