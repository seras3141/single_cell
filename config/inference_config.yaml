# Inference Configuration for Single Cell Analysis Pipeline

paths:
  input_dir: "data/sample_data_out/split_data"  # Base directory with datasets
  output_dir: "data/sample_data_out/"  # Where to store the results

# Segmentation model configuration
segmentation:
  cellpose:
    model_type: "cellpose-sam"  # Options: cyto, cyto2, cyto3, nuclei, or custom model path
    gpu: true
    channels: [0, 0]  # [cytoplasm, nucleus] - [0,0] for grayscale
    diameter: null  # Auto-diameter detection, or specify in pixels
    flow_threshold: 0.4  # Flow error threshold (0.0-1.0)
    cellprob_threshold: 0.0  # Cell probability threshold
    min_size: 30  # Minimum cell size in pixels
    normalize: true
    invert: false

  inference:
    dataset_name: ""  # Subfolder within input_dir (and subfolder in results_folder)
    results_folder: "inference"  # Subfolder within output_dir
    file_pattern: "*_BF.tif"  # Glob pattern for selecting image files
    process_z_stacks: false  # Whether to process Z-stacks
    save_overlays: true  # Whether to save overlay images
    save_metadata: true  # Whether to save JSON metadata for predictions
#   # save_individual_slices: true  # For Z-stacks, save individual slices
#   # create_subdirs: true  # Create organized subdirectories


# Logging configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  filename: "logs/inference.log"

distributed:
  enabled: true          # Enable distributed inference
  backend: "nccl"        # Backend for distributed processing (e.g., nccl, gloo)
  init_method: "env://"  # Initialization method for distributed processing

# Optional future extensions
# runtime:
#   batch_size: 1                   # Placeholder for batching
#   num_workers: 4                 # For multi-threaded preprocessing
#   process_z_stacks: false            # Whether to process Z-stacks


