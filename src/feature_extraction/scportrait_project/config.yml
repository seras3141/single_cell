name: "BF-only single-cell featurization (ConvNeXt)"

# CytosolOnlySegmentationCellpose: whole-image (non-sharded) Cellpose segmentation.
# cyto3 is the latest Cellpose model with improved cytosol detection over cyto2;
# it handles brightfield images well without requiring a nuclear marker.
# filter_masks_size is disabled to retain small cells that may otherwise be dropped.
CytosolOnlySegmentationCellpose:
  # model: cyto3
  filter_masks_size: false
  cache: "."
  cytosol_segmentation:
    model: "cyto3"

# HDF5CellExtraction: crops individual cells from the segmented image into an
# HDF5 archive. image_size=128 gives enough context around each cell for the
# encoder while keeping memory usage manageable. compression reduces disk usage
# at negligible CPU cost. threads=4 balances throughput on a standard workstation.
HDF5CellExtraction:
  image_size: 128
  compression: true
  threads: 4
  cache: "."
  normalize_output: true
  normalization_range: [0.01, 0.99]

# ConvNeXtFeaturizer: ConvNeXt-based deep featurization of single-cell crops.
# channel_selection=0 selects the brightfield channel (index 0 of the BF-only
# HDF5 crops). inference_device=cuda runs featurization on the GPU (requires a
# GPU allocation, e.g. slurm/python_code.sbatch on gpu_p); set back to "cpu" for
# portable CPU-only runs, in which case dataloader_worker_number must be 0.
# dataloader_worker_number=4 matches --cpus-per-task=4 for GPU dataloading throughput.
ConvNeXtFeaturizer:
  channel_selection: 0
  dataloader_worker_number: 4     # set to 0 when inference_device is cpu
  batch_size: 128
  inference_device: "cuda"
  label: "convnext_bf_features"
