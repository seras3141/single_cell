[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--verbose",
    "--tb=short",
    "--strict-markers",
    "--disable-warnings",
]
markers = [
    "unit: Unit tests",
    "integration: Integration tests", 
    "slow: Slow tests that require significant resources",
    "gpu: Tests that require GPU",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[build-system]
requires = ["setuptools>=45", "wheel", "setuptools_scm[toml]>=6.2"]
build-backend = "setuptools.build_meta"

[project]
name = "single-cell-inference"
version = "0.1.0"
description = "Cell segmentation inference pipeline"
authors = [{name = "Cell Segmentation Team"}]
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.8"

dependencies = [
    "numpy>=1.21.0",
    "tifffile>=2021.7.2",
    "pyyaml>=5.4.0",
    "pytest>=6.0.0",
    "pytest-cov>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=6.0.0",
    "pytest-cov>=2.0.0",
    "pytest-mock>=3.0.0",
    "black>=21.0.0",
    "flake8>=3.8.0",
    "mypy>=0.910",
]

cellpose = [
    "cellpose>=3.0.0",
    "torch>=1.9.0",
    "torchvision>=0.10.0",
]

gpu = [
    "torch>=1.9.0+cu121",
    "torchvision>=0.10.0+cu121",
]

all = [
    "cellpose>=3.0.0",
    "torch>=1.9.0",
    "torchvision>=0.10.0",
    "matplotlib>=3.0.0",
    "scipy>=1.7.0",
]
